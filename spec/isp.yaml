                    format: uri-reference
                    type: string
                  playback_query_params:
                    description: 'Specifies any query parameters that will be added to playback urls. Should not include the initial ''?'' Example: ''foo=bar&q=golang'''
                    type: string
                  publish_base_url:
                    description: The base URL where generated playlists will be sent/published. Each publish point requires a unique 'publish_base_url'.
                    format: uri-reference
                    type: string
                  secure_header_auth:
                    additionalProperties: false
                    properties:
                      arn:
                        description: arn is the AWS Secret ARN that contains the secure header list to be applied.
                        type: string
                      version_id:
                        description: version_id is the AWS Secret's version ID that contains the version of the secret to be applied.
                        type: string
                    type: object
                type: object
              type:
