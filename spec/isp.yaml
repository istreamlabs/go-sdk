    Eac3Settings:
      additionalProperties: false
      properties:
        ddp_joc_complexity_index:
          description: Configures the maximum DD+JOC complexity index the content is expected to have. This does not configure the actual encoder, but simply indicates the value that should appear in manifests given to the player. This may only be used when 'ddp_joc_passthrough' is enabled. A legacy default of 10 applies to channels using pure passthrough which do not configure this; hybrid passthrough requires this to be configured explicitly, and additionally requires a value of at least 12 since that's what encoded output will have. When encoding DD+JOC without passthrough, the manifests reflect the actual transcoder output and manual configuration is not permitted.
          examples:
            - 12
          format: int32
          type: integer
        ddp_joc_logical_channels:
          description: 'If non-zero, configures the encoder to compute JOC metadata (i.e. Dolby Atmos) for the given logical speaker layout. The transcoder does not guarantee any particular bed layout in the JOC metadata, and this setting currently has no effect on that. It merely determines the channel layout to which all inputs are converted before encoding. Legal values are: 8 - 5.1.2 10 - 5.1.4 For sources with raw PCM input and more than 6 channels, configure this according to the expected input channel layout. For channels which expect to take a 7.1 EAC-3 input, configure to 8. For all other cases, including upmixing from 5.1 or fewer channels or any kind of Atmos input, configure to 10. This setting can be used at the same time as ddp_joc_passthrough to enable ''hybrid passthrough''. In this case, this setting only governs what is used for the case where the input is not already DD+JOC.'
          examples:
            - 10
          format: int32
          type: integer
        ddp_joc_passthrough:
          description: Indicates that the source will contain Joint Object Coding metadata (Dolby Atmos) and that the encoder should operate in passthrough mode. https://learning.dolby.com/hc/en-us/articles/4406039180564-Appendix-C-Dolby-Atmos-Delivery-Codecs- When the audio encoder is configured with this setting, the source audio will be repackaged without being decoded and re-encoded. If ddp_joc_logical_channels is not configured and the source is not DD+JOC, it will be replaced with silence. If ddp_joc_logical_channels is configured, the source will be reencoded if it is not DD+JOC and passed through unchanged when it is. The latter case is called 'hybrid passthrough' and also requires configuration of ddp_joc_complexity_index.
          type: boolean
        drc_line_mode:
          description: If specified, overrides the dynamic range control line mode. If unspecified and the source audio is AC-3 or EAC-3, the DRC line mode matches the input. If unspecified and the source audio is any other codec, the encoder uses an unspecified default which may change without notice.
          enum:
            - DRC_FILM_STANDARD
            - DRC_FILM_LIGHT
            - DRC_MUSIC_STANDARD
            - DRC_MUSIC_LIGHT
            - DRC_SPEECH
          examples:
            - DRC_FILM_STANDARD
          type: string
        drc_rf_mode:
          description: If specified, overrides the dynamic range control RF mode. If unspecified and the source audio is AC-3 or EAC-3, the DRC RF mode matches the input. If unspecified and the source audio is any other codec, the encoder uses an unspecified default which may change without notice.
          enum:
            - DRC_FILM_STANDARD
            - DRC_FILM_LIGHT
            - DRC_MUSIC_STANDARD
            - DRC_MUSIC_LIGHT
            - DRC_SPEECH
          examples:
            - DRC_FILM_STANDARD
          type: string
        surround_phase_shift:
          description: If specified, overrides whether surround phase shift is enabled. If unspecified and the source audio is AC-3 or EAC-3, the surround phase shift mode matches the input. If unspecified and the source audio is any other codec, the encoder uses an unspecified default which may change without notice.
          enum:
            - SURROUND_PHASE_SHIFT_ENABLED
            - SURROUND_PHASE_SHIFT_DISABLED
          examples:
            - SURROUND_PHASE_SHIFT_ENABLED
          type: string
      type: object
