            - IGNORE_END_SIGNAL
          type: string
        segments:
          description: Specifies the list of which segment types this setting applies to. Any segment type defined here _must_ also be present in the parent signaling configuration.
          items:
            enum:
              - SPLICE_INSERT
              - CONTENT_ID
              - PROGRAM
              - PROGRAM_BLACKOUT_OVERRIDE
              - PROGRAM_BREAKAWAY
              - CHAPTER
              - BREAK
              - OPENING_CREDIT
              - CLOSING_CREDIT
              - PROVIDER_PLACEMENT_OP
              - DISTRIBUTOR_PLACEMENT_OP
              - PROVIDER_OVERLAY_OP
              - DISTRIBUTOR_OVERLAY_OP
              - PROVIDER_AD
              - DISTRIBUTOR_AD
              - UNSCHEDULED_EVENT
              - NETWORK
              - SLATE
              - NOT_INDICATED
              - TIMED_METADATA
              - TIMED_METADATA_MARKER_OVER_SLATE
            type: string
          type:
            - array
            - "null"
          uniqueItems: true
        tier_filter:
          additionalProperties: false
          properties:
            explicit_tier:
              additionalProperties: false
              properties:
                values:
                  items:
