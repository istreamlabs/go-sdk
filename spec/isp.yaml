                                enum:
                                  - PAGE_TYPE_INITIAL
                                  - PAGE_TYPE_SUBTITLE
                                  - PAGE_TYPE_ADDITIONAL_INFORMATION
                                  - PAGE_TYPE_PROGRAMME_SCHEDULE
                                  - PAGE_TYPE_SUBTITLE_HEARING_IMPAIRED
                                type: string
                            type: object
