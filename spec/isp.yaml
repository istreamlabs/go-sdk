                                        type: string
                                      type: array
                                      uniqueItems: true
                                    video_encoder_ids:
                                      description: Specify which video encoders should be used for this presentation. If none are specified, all video encoders configured for the parent Publication will be used.
                                      items:
                                        type: string
                                      type: array
                                      uniqueItems: true
                                  type: object
                                type: array
