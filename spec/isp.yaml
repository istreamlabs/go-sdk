                      items:
                        additionalProperties: false
                        properties:
                          ac4:
                            additionalProperties: false
                            properties:
                              encoding_mode:
                                enum:
                                  - ENCODING_MODE_UNSPECIFIED
                                  - ENCODING_MODE_EMISSION
