                      description: Audio encoders specify audio conversion settings, e.g. channels, samples, codec, bitrate, etc.
                      items:
                        additionalProperties: false
                        properties:
                          ac4:
                            additionalProperties: false
                            properties:
                              encoding_mode:
                                enum:
