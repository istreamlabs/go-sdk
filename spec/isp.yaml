                    minLength: 1
                    pattern: ^rtmps?://
                    type: string
                  video_encoder_id:
                    description: Only h264 encoders are supported
                    minLength: 1
                    type: string
                type: object
              type:
                - array
                - "null"
            srt_publications:
              description: A set of configurations for delivering SRT streams
              items:
                additionalProperties: false
                properties:
                  audio_encoders:
                    items:
                      $ref: '#/components/schemas/SrtPublicationEncoder'
