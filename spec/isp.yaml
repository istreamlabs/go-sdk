                    additionalProperties: false
                    properties:
                      profile:
                        description: H.264 video profile, which defines various encoder features and settings. See https://en.wikipedia.org/wiki/Advanced_Video_Coding#Profiles for details.
                        enum:
                          - BASELINE
                          - MAIN
                          - HIGH
                          - HIGH_10
                          - HIGH_422
                        type: string
                    type: object
                  h265:
                    additionalProperties: false
                    properties:
                      hdr:
                        additionalProperties: false
                        properties:
                          dolby_vision:
