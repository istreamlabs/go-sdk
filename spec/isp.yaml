components:
  schemas:
    Ac4Settings:
      additionalProperties: false
      properties:
        encoding_mode:
          enum:
            - ENCODING_MODE_UNSPECIFIED
            - ENCODING_MODE_EMISSION
          examples:
            - ENCODING_MODE_EMISSION
          type: string
      type: object
    Archive:
      additionalProperties: false
      properties:
        s3:
          $ref: '#/components/schemas/S3'
      required:
        - s3
      type: object
    ArchiveFERRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/ArchiveFERRequest.json
          format: uri
          readOnly: true
          type: string
        correlation_id:
          description: Correlation ID for this FER archive request
          type: string
        global_query_string:
          description: Portion of the query string that applies to all packages
          type: string
        notification:
          $ref: '#/components/schemas/DynamicNotification'
          description: Notification settings
        packages:
          description: Packages to be archived as FERs
          items:
            $ref: '#/components/schemas/Package'
          type:
            - array
            - "null"
      required:
        - correlation_id
        - global_query_string
        - packages
        - notification
      type: object
    ArchiveFERResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/ArchiveFERResponse.json
          format: uri
          readOnly: true
          type: string
        correlation_id:
          description: Identifier that is carried through the archive request
          type: string
        task_id:
          description: Task ID for the archive task started by the L2V service
          type: string
      required:
        - task_id
      type: object
    ArchiveSettings:
      additionalProperties: false
      properties:
        global_archive_settings:
          $ref: '#/components/schemas/GlobalArchiveSettings'
        netstorage_connection_settings:
          items:
            $ref: '#/components/schemas/NetStorageSettings'
          type:
            - array
            - "null"
        s3_archive_settings:
          items:
            $ref: '#/components/schemas/S3ArchiveSettings'
          type:
            - array
            - "null"
        workflow_id:
          type: string
      type: object
    AtlasProvider:
      additionalProperties: false
      properties:
        asset_id:
          description: The Asset Identifier which was taken from the token entitlement service request.
          type: string
        company_id:
          description: The Identifier of the Company that this token belongs.
          type: string
        drms:
          description: DRM system keys to request
          items:
            enum:
              - WIDEVINE
              - FAIRPLAY
              - PRIMETIME
              - PLAYREADY
              - W3C_COMMON_CLEAR_KEY
              - BULK_FILE
            type: string
          type:
            - array
            - "null"
          uniqueItems: true
        widevine_v0_pssh_box:
          description: When TRUE the KeyID is not embedded in the pssh box which sets the version to 0. Defaults to generating v1 pssh_boxes that includes the key_id
          type: boolean
      type: object
    AudioEncoder:
      additionalProperties: false
      properties:
        ac4:
          additionalProperties: false
          properties:
            encoding_mode:
              enum:
                - ENCODING_MODE_UNSPECIFIED
                - ENCODING_MODE_EMISSION
              examples:
                - ENCODING_MODE_EMISSION
              type: string
          type: object
        audio_source_id:
          description: Audio source ID specifies which stream within the audio source to use.
          minLength: 1
          type: string
        bit_rate:
          description: Bit rate specifies the constant number of bits used per second. Higher values result in better audio quality but bigger file sizes.
          examples:
            - 128000
          exclusiveMinimum: 1000
          format: int32
          type: integer
        channels:
          description: 'Channels specifies the number of real audio channels to encode. The available options depend on the audio codec. The encoder supports different channel configurations based on the codec; AAC 1-2 channels, AC3 supports 2 or 6, and EAC3 supports 2 or 6. For example, for AC3 5.1 one would set 6 channels. Channel configurations are as follows: 1 - Mono (C) 2 - Stereo / Dolby 2.0 (L, R) 6 - Dolby 5.1 (L, C, R, l, r, LFE) 10 - Dolby 5.1.4 (AC4 only) Dolby Atmos layouts such as 5.1.4 are achieved by setting this field to 6 and configuring ddp_joc_logical_channels in EAC3Settings as desired.'
          examples:
            - 2
          exclusiveMinimum: 0
          format: int32
          maximum: 10
          type: integer
        codec:
          description: Codec specifies the audio data encoding format.
          enum:
            - AAC_LC
            - AC3
            - EAC3
            - HE_AAC
            - AC4
          type: string
        eac3:
          additionalProperties: false
          properties:
            ddp_joc_complexity_index:
              description: Configures the maximum DD+JOC complexity index the content is expected to have. This does not configure the actual encoder, but simply indicates the value that should appear in manifests given to the player. This may only be used when 'ddp_joc_passthrough' is enabled. A legacy default of 10 applies to channels using pure passthrough which do not configure this; hybrid passthrough requires this to be configured explicitly, and additionally requires a value of at least 12 since that's what encoded output will have. When encoding DD+JOC without passthrough, the manifests reflect the actual transcoder output and manual configuration is not permitted.
              examples:
                - 12
              format: int32
              type: integer
            ddp_joc_logical_channels:
              description: 'If non-zero, configures the encoder to compute JOC metadata (i.e. Dolby Atmos) for the given logical speaker layout. The transcoder does not guarantee any particular bed layout in the JOC metadata, and this setting currently has no effect on that. It merely determines the channel layout to which all inputs are converted before encoding. Legal values are: 8 - 5.1.2 10 - 5.1.4 For sources with raw PCM input and more than 6 channels, configure this according to the expected input channel layout. For channels which expect to take a 7.1 EAC-3 input, configure to 8. For all other cases, including upmixing from 5.1 or fewer channels or any kind of Atmos input, configure to 10. This setting can be used at the same time as ddp_joc_passthrough to enable ''hybrid passthrough''. In this case, this setting only governs what is used for the case where the input is not already DD+JOC.'
              examples:
                - 10
              format: int32
              type: integer
            ddp_joc_passthrough:
              description: Indicates that the source will contain Joint Object Coding metadata (Dolby Atmos) and that the encoder should operate in passthrough mode. https://learning.dolby.com/hc/en-us/articles/4406039180564-Appendix-C-Dolby-Atmos-Delivery-Codecs- When the audio encoder is configured with this setting, the source audio will be repackaged without being decoded and re-encoded. If ddp_joc_logical_channels is not configured and the source is not DD+JOC, it will be replaced with silence. If ddp_joc_logical_channels is configured, the source will be reencoded if it is not DD+JOC and passed through unchanged when it is. The latter case is called 'hybrid passthrough' and also requires configuration of ddp_joc_complexity_index.
              type: boolean
            drc_line_mode:
              description: If specified, overrides the dynamic range control line mode. If unspecified and the source audio is AC-3 or EAC-3, the DRC line mode matches the input. If unspecified and the source audio is any other codec, the encoder uses an unspecified default which may change without notice.
              enum:
                - DRC_FILM_STANDARD
                - DRC_FILM_LIGHT
                - DRC_MUSIC_STANDARD
                - DRC_MUSIC_LIGHT
                - DRC_SPEECH
              examples:
                - DRC_FILM_STANDARD
              type: string
            drc_rf_mode:
              description: If specified, overrides the dynamic range control RF mode. If unspecified and the source audio is AC-3 or EAC-3, the DRC RF mode matches the input. If unspecified and the source audio is any other codec, the encoder uses an unspecified default which may change without notice.
              enum:
                - DRC_FILM_STANDARD
                - DRC_FILM_LIGHT
                - DRC_MUSIC_STANDARD
                - DRC_MUSIC_LIGHT
                - DRC_SPEECH
              examples:
                - DRC_FILM_STANDARD
              type: string
            surround_phase_shift:
              description: If specified, overrides whether surround phase shift is enabled. If unspecified and the source audio is AC-3 or EAC-3, the surround phase shift mode matches the input. If unspecified and the source audio is any other codec, the encoder uses an unspecified default which may change without notice.
              enum:
                - SURROUND_PHASE_SHIFT_ENABLED
                - SURROUND_PHASE_SHIFT_DISABLED
              examples:
                - SURROUND_PHASE_SHIFT_ENABLED
              type: string
          type: object
        id:
          description: Encoder ID. IDs must be unique for all encoders. This ID is referenced when setting up playlist publishing.
          examples:
            - aac128
          minLength: 1
          type: string
        loudness:
          additionalProperties: false
          properties:
            dialog_intel:
              description: Enable Dialog Intelligence. Only supported for (E)AC-3 encoders. This may only be set if lkfs is explicitly configured to -24.
              type: boolean
            lkfs:
              description: Loudness normalization LKFS setting. Default value is -24.
              format: int32
              type: integer
            peak_limit:
              description: Peak Limit. The only allowable value is -2.0. This field is soft-deprecated and will be unsupported in a future transcoder version. In the current transcoder version, the values 0.0 and -2.0 both produce the same configuration.
              format: float
              type: number
          type: object
        sample_rate:
          description: 'Sample rate specifies the number of audio samples in hertz. The available options depend on the audio codec: AAC-LC supports 8000, 11025, 12000, 16000, 22050, 24000, 32000, 44100, 48000, 64000, 88200, and 96000. HE-AAC supports 16000, 22050, 24000, 32000, 44100, and 48000. AC3/EAC3 support only 48000.'
          examples:
            - 48000
          exclusiveMinimum: 0
          format: int32
          type: integer
        tag:
          description: Used by the player to map audio tracks to a quadrant, which represents a single view in a multiview layout. This value is opaque and not used by Aventus.
          type: string
      type: object
    AudioMute:
      additionalProperties: false
      properties:
        audio_channel:
          enum:
            - ALL
            - FRONT_LEFT
            - FRONT_RIGHT
            - FRONT_CENTER
            - LOW_FREQUENCY
            - SIDE_LEFT
            - SIDE_RIGHT
          examples:
            - FRONT_LEFT
          type: string
        audio_source_id:
          minLength: 1
          type: string
      type: object
    AudioSource:
      additionalProperties: false
      properties:
        id:
          minLength: 1
          type: string
        language:
          description: RFC 5646, e.g. 'en' 'en-US'
          minLength: 1
          type: string
        license:
          description: License specifies how the audio in this source is licensed.
          enum:
            - LIVE
            - REPLAY
          type: string
        name:
          description: Language fiendly name, e.g. 'English', 'Spanish'
          minLength: 1
          type: string
        selector:
          description: Expression for choosing an audio track in the stream for this AudioSource https://wbdstreaming.atlassian.net/wiki/spaces/LIVE/pages/250351679/Proposal+Audio+Track+Selection
          type: string
      type: object
    AudioTrackInfo:
      additionalProperties: false
      properties:
        bitrate:
          format: int32
          type: integer
        codec_string:
          description: codec_string will be set to the RFC 6381 compliant string that represents the specific codec in this AudioTrackInfo. ex. 'mp4a.40.2' for AAC Low-Complexity.
          type: string
        id:
          format: int32
          minimum: 0
          type: integer
        name:
          description: Friendly name of the AudioTrack.
          type: string
        num_channels:
          format: int32
          type: integer
        sample_rate:
          format: int32
          type: integer
      type: object
    BasicAuth:
      additionalProperties: false
      properties:
        password:
          description: Plain text password for basic auth.
          type: string
        username:
          description: Username for basic auth.
          type: string
      type: object
    BulkFileEncryption:
      additionalProperties: false
      properties:
        iv_rotation:
          description: How often the IV should be rotated and how it should be created
          enum:
            - RANDOM_PER_KEY
            - PER_SEGMENT_NUMBER
            - UNIQUE_PER_SEGMENT
          type: string
      type: object
    CancelTaskResponseBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/CancelTaskResponseBody.json
          format: uri
          readOnly: true
          type: string
        error:
          $ref: '#/components/schemas/ErrorDetail'
          description: Error when canceling task
      required:
        - error
      type: object
    Channel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/Channel.json
          format: uri
          readOnly: true
          type: string
        created:
          description: Date and time the channel was created.
          format: date-time
          readOnly: true
          type: string
        description:
          description: A human-readable description of the channel.
          type: string
        desired_state:
          description: Desired running state for a channel.
          enum:
            - "ON"
            - "OFF"
          type: string
        enable_byoip:
          description: Indicates whether the channel's transcoder needs to run in a designated IP range.
          type: boolean
        id:
          description: External Channel ID provided at channel creation time
          examples:
            - my-channel
          minLength: 1
          pattern: ^([a-z0-9]+(-*[a-z0-9]+)*)$
          readOnly: true
          type: string
        ingest:
          $ref: '#/components/schemas/Ingest'
          description: Ingest configures inputs for the transcoder.
        labels:
          description: Optional labels for a channel. Any included labels must be at least 1 character long, but no greater than 256 characters. The maximum number of labels is 50.
          items:
            type: string
          maxItems: 50
          type:
            - array
            - "null"
        modified:
          description: Date and time the channel was last modified.
          format: date-time
          readOnly: true
          type: string
        name:
          description: A friendly human-readable name for the channel. This will get displayed in user interfaces.
          examples:
            - My Channel
          type: string
        organization:
          minLength: 1
          type: string
        packaging:
          $ref: '#/components/schemas/Packaging'
          description: Packaging configures media format and content protection settings.
        publishing:
          $ref: '#/components/schemas/Publishing'
          description: Publishing configures playlist formats and where to send video and playlist data.
        region:
          description: Region represents the general geolocation for transcoding and stream egress from iStreamPlanet. If no region is provided at channel creation time, then 'US_WEST' is used.
          enum:
            - US_WEST
            - US_EAST
          type: string
        resource_class:
          description: If the ResourceClass is unspecified the channel will default to run in the 'DYNAMIC' ResourceClass. Note that changing the ResourceClass for a running channel is supported and will be performed with no downtime.
          enum:
            - DYNAMIC
            - STATIC
          type: string
        self:
          description: Self link for the channel.
          format: uri-reference
          readOnly: true
          type: string
        signaling:
          $ref: '#/components/schemas/Signaling'
          description: Signaling configures in-band signaling (i.e. SCTE-35).
        tags:
          $ref: '#/components/schemas/Tags'
          description: Use ChannelMetadata when possible instead of tags.
        transcode:
          $ref: '#/components/schemas/Transcode'
          description: Transcode configures audio/video conversion settings.
      required:
        - ingest
        - transcode
      type: object
    ChannelCostReport:
      additionalProperties: false
      properties:
        channel_name:
          type: string
        channel_urn:
          type: string
        duration_secs:
          format: int64
          type: integer
        external_id:
          type: string
        has_hdr:
          type: boolean
        has_realtime_output:
          type: boolean
        has_uhd:
          type: boolean
        labels:
          items:
            type: string
          type:
            - array
            - "null"
        organization:
          type: string
        verbit_encoder_count:
          format: int32
          minimum: 0
          type: integer
      type: object
    ChannelPlaybackBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/ChannelPlaybackBody.json
          format: uri
          readOnly: true
          type: string
        cmaf:
          description: CMAF playback configurations
          items:
            $ref: '#/components/schemas/ChannelPlaybackConfiguration'
          type:
            - array
            - "null"
        dash:
          description: Dash playback configurations
          items:
            $ref: '#/components/schemas/ChannelPlaybackConfiguration'
          type:
            - array
            - "null"
        hls:
          description: HLS playback configurations
          items:
            $ref: '#/components/schemas/ChannelPlaybackConfiguration'
          type:
            - array
            - "null"
        origin:
          description: Origin playback configurations
          items:
            $ref: '#/components/schemas/PlaybackConfiguration'
          type:
            - array
            - "null"
      type: object
    ChannelPlaybackConfiguration:
      additionalProperties: false
      properties:
        content_protection:
          $ref: '#/components/schemas/ContentProtection'
          description: Content Protection settings
        partial_presentations:
          description: Partial Presentation Playback URLs
          items:
            type: string
          type:
            - array
            - "null"
        url:
          description: Playback URL
          type: string
      required:
        - url
      type: object
    ChannelTimelineEntry:
      additionalProperties: false
      properties:
        action:
          description: Shortcode indicating what action was taken
          type: string
        agent:
          description: Agent responsible for the action taken
          type: string
        query:
          type: string
        request_body:
          description: The request body, if any, of the original action
          type: string
        status_code:
          description: HTTP Status code indicating outcome of the action.
          format: int64
          type: integer
        timestamp:
          description: Timestamp of the action in UTC
          format: date-time
          type:
            - string
            - "null"
        trace_id:
          description: Correlation identifier for tracing
          type: string
      required:
        - trace_id
        - agent
        - action
        - status_code
        - timestamp
        - request_body
      type: object
    Cie1931P:
      additionalProperties: false
      properties:
        x:
          format: double
          type: number
        "y":
          format: double
          type: number
      type: object
    ClearSegmentConfig:
      additionalProperties: false
      properties:
        first_published:
          description: date first published
          format: date-time
          type:
            - string
            - "null"
        store:
          description: store location
          type: string
        store_prefix:
          description: prefix of the store
          type: string
      required:
        - store
        - store_prefix
        - first_published
      type: object
    Clip:
      additionalProperties: false
      properties:
        clip_id:
          description: Primary ID for the clip
          type: string
        created:
          description: Created timestamp in RFC3339Nano format
          examples:
            - "2006-01-02T15:04:05.9999Z"
          format: date-time
          type: string
        description:
          description: Description for the clip
          type: string
        duration:
          description: Duration of the clip in seconds
          format: int64
          type: integer
        end:
          description: End timestamp in RFC3339Nano format
          examples:
            - "2006-01-02T15:04:05.9999Z"
          format: date-time
          type: string
        mp4path:
          description: Path for the MP4 for the clip
          type: string
        start:
          description: Start timestamp in RFC3339Nano format
          examples:
            - "2006-01-02T15:04:05.9999Z"
          format: date-time
          type: string
      required:
        - clip_id
        - description
        - mp4path
        - created
        - start
        - end
        - duration
      type: object
    ClipGroup:
      additionalProperties: false
      properties:
        clips:
          description: List of clips associated with the VOD
          items:
            $ref: '#/components/schemas/Clip'
          type:
            - array
            - "null"
        vod_id:
          description: ID of the VOD from which the clips were created
          type: string
      required:
        - vod_id
        - clips
      type: object
    ClipManifestResponse:
      additionalProperties: false
      properties:
        cdnURL:
          description: CDN Url for manifest
          type: string
        manifestID:
          description: Manifest ID for clip
          format: int64
          type: integer
        path:
          description: Manifest path
          type: string
        storepath:
          description: VOD storepath for manifest
          type: string
      required:
        - manifestID
        - path
        - storepath
        - cdnURL
      type: object
    ClosedCaptionSourceStream:
      additionalProperties: false
      properties:
        auto_select:
          description: Indicates that the client should play the captioning media selection group if the user has not indicated a user preference. If both auto_select and default are not set, the first captioning media selection group will be used.
          enum:
            - "NO"
            - "YES"
          type: string
        default:
          description: Configures the captioning media selection group that will be played if the user has not indicated a user preference. If both auto_select and default are not set, the first captioning media selection group will be used.
          enum:
            - "NO"
            - "YES"
          type: string
        language:
          description: Language code as RFC 5646, e.g. 'en' 'en-US'.
          type: string
        name:
          description: Source stream name.
          type: string
      type: object
    CollapseConfig:
      additionalProperties: false
      properties:
        auto_copy_mp4:
          type: boolean
        auto_create_mp4:
          type: boolean
        m3u8_filters_config:
          $ref: '#/components/schemas/M3U8FilterConfig'
        use_per_url_collapse_notification:
          type: boolean
        v2_filters_config:
          $ref: '#/components/schemas/V2FilterConfig'
      type: object
    CollapseTrigger:
      additionalProperties: false
      properties:
        scte35_upid:
          type: string
        segmentation_event_id:
          format: int32
          minimum: 0
          type: integer
        segmentation_type_id:
          format: int32
          type: integer
      required:
        - segmentation_type_id
      type: object
    CollapseTriggerConfig:
      additionalProperties: false
      properties:
        allow_multiple:
          type: boolean
        collapse_program:
          type: boolean
        collapse_stream:
          type: boolean
        scte35_upid:
          type: string
        triggers:
          items:
            $ref: '#/components/schemas/CollapseTrigger'
          type:
            - array
            - "null"
      required:
        - collapse_program
        - allow_multiple
        - collapse_stream
      type: object
    CollapseVODRequest:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/CollapseVODRequest.json
          format: uri
          readOnly: true
          type: string
        clip_prefix:
          description: Prefix for clip
          type: string
        clip_suffix:
          description: Suffix for clip
          type: string
        disable_auto_prefix:
          description: Disable any autoprefix
          type: boolean
        end_time:
          description: EndTime of VOD
          format: date-time
          type: string
        filterconfig:
          $ref: '#/components/schemas/VODFilterConfig'
          description: SCTE/TIME based filtering on collapses
        new_clip_description:
          description: Description for new collapsed clip
          type: string
        new_clip_id:
          description: New Clip ID for collapsed clip
          format: int64
          type: integer
        publish_vod:
          description: Publish newly created VOD
          type: boolean
        start_time:
          description: StartTime of VOD
          format: date-time
          type: string
        upid:
          description: UPID for VOD
          type: string
      required:
        - new_clip_id
        - new_clip_description
      type: object
    CollapseVODResponseBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://api.istreamplanet.com/schemas/CollapseVODResponseBody.json
          format: uri
          readOnly: true
          type: string
        clip_id:
          description: New Clip ID for collapsed vod
          format: int64
          type: integer
        task_id:
          description: Identifies collapse task id
          type: string
      required:
        - task_id
        - clip_id
      type: object
    ColorDescription:
      additionalProperties: false
      properties:
        color_primaries:
          enum:
            - CP_RESERVED
            - CP_BT_709
            - CP_BT_470_M
            - CP_BT_470_BG
            - CP_SMPTE_170_M
            - CP_SMPTE_240_M
            - CP_FILM
            - CP_BT_2020
            - CP_SMPTE_428
            - CP_SMPTE_431
            - CP_SMPTE_432
          type: string
        matrix_coeffs:
          enum:
            - MC_GBR
            - MC_BT_709
            - MC_FCC
            - MC_BT_470_BG
            - MC_SMPTE_170_M
            - MC_SMPTE_240_M
            - MC_Y_CG_CO
            - MC_BT_2020_NC
            - MC_BT_2020_C
            - MC_SMPTE_2085
            - MC_CHROMA_DERIVED_NC
            - MC_CHROMA_DERIVED_C
            - MC_I_CT_CP
          type: string
        transfer_characteristics:
          enum:
            - TC_RESERVED
            - TC_BT_709
            - TC_BT_470_M
            - TC_BT_470_BG
            - TC_SMPTE_170_M
            - TC_SMPTE_240_M
