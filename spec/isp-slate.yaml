components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://int.api.istreamplanet.com/docs/slates/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: '#/components/schemas/ErrorDetail'
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    Slate:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://int.api.istreamplanet.com/docs/slates/schemas/Slate.json
          format: uri
          readOnly: true
          type: string
        description:
          description: A friendly slate description.
          example: slate for event 1
          type: string
        id:
          description: Unique identifier for this slate
          example: slate-id-1
          type: string
        url:
          description: The url where the slate can be accessed.
          example: https://example.com/path/to/image.jpg
          type: string
      required:
        - id
        - description
        - url
      type: object
    SlateWithoutID:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://int.api.istreamplanet.com/docs/slates/schemas/SlateWithoutID.json
          format: uri
          readOnly: true
          type: string
        description:
          description: A friendly slate description.
          example: slate for event 1
          type: string
        url:
          description: The url where the slate can be accessed. Must be a valid URL
          example: https://example.com/path/to/image.jpg
          type: string
      required:
        - description
        - url
      type: object
  securitySchemes:
    authcode:
      flows:
        authorizationCode:
          scopes: null
          tokenUrl: ""
      type: oauth2
    m2m:
      flows:
        clientCredentials:
          scopes: null
          tokenUrl: ""
      type: oauth2
info:
  contact:
    email: support@istreamplanet.com
    name: Slate Management
    url: https://istreamplanet.com/contact/
  title: iStreamPlanet Slate Management API
  version: 1.0.0
openapi: 3.0.3
paths:
  /v2/{org}/slates:
    get:
      description: List all slates
      operationId: list-org-slates
      parameters:
        - description: Organization name
          in: path
          name: org
          required: true
          schema:
            description: Organization name
            type: string
        - description: Current page cursor
          explode: false
          in: query
          name: cursor
          schema:
            description: Current page cursor
            type: string
        - description: Number of items to return
          explode: false
          in: query
          name: limit
          schema:
            default: 100
            description: Number of items to return
            format: int32
            maximum: 100
            minimum: 1
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Slate'
                nullable: true
                type: array
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
            Link:
              schema:
                description: HTTP links for pagination
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unauthorized
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unprocessable Entity
        "499":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Service Unavailable
      summary: List Slates
      tags:
        - Slates for Organization
  /v2/{org}/slates/{slate-id}:
    delete:
      description: |-
        Delete Slate
        Delete a slate by id.
      operationId: delete-org-slate
      parameters:
        - description: Organization name
          in: path
          name: org
          required: true
          schema:
            description: Organization name
            type: string
        - description: Unique identifier for this slate
          example: slate-id-1
          in: path
          name: slate-id
          required: true
          schema:
            description: Unique identifier for this slate
            example: slate-id-1
            type: string
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unauthorized
        "409":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Conflict
        "412":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Precondition Failed
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unprocessable Entity
        "499":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Service Unavailable
      summary: Delete Slate
      tags:
        - Slates for Organization
    get:
      description: |-
        Get Slate
        Get a slate by id.
      operationId: get-org-slate
      parameters:
        - description: Organization name
          in: path
          name: org
          required: true
          schema:
            description: Organization name
            type: string
        - description: Unique identifier for this slate
          example: slate-id-1
          in: path
          name: slate-id
          required: true
          schema:
            description: Unique identifier for this slate
            example: slate-id-1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slate'
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
            Link:
              schema:
                type: string
        "304":
          description: Not Modified
          headers:
            Managed-By:
              schema:
                type: string
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unauthorized
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unprocessable Entity
        "499":
          content:
