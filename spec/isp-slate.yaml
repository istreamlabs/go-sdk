              schema:
                $ref: '#/components/schemas/ErrorModel'
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Service Unavailable
      summary: Get Slate
      tags:
        - Slates for Organization
    put:
      description: |-
        Create/Update Slate
        Create or update a slate by id.  The URL of the slate must already exist.
      operationId: put-org-slate
      parameters:
        - description: Unique identifier for this slate
          example: slate-id-1
          in: path
          name: slate-id
          required: true
          schema:
            description: Unique identifier for this slate
            example: slate-id-1
            type: string
        - description: Organization name
          in: path
          name: org
          required: true
          schema:
            description: Organization name
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlateWithoutID'
              description: Slate Request Body
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Slate'
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
            Link:
              schema:
                type: string
        "201":
          description: Created
          headers:
            Content-Type:
              schema:
                type: string
            Link:
              schema:
                type: string
        "204":
          description: No Content
        "304":
          description: Not Modified
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Bad Request
        "401":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
          description: Unauthorized
        "403":
